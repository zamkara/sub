name: 🎬 Subtitle Tool Pipeline

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-check:
    name: 🔍 Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 🎨 Check formatting
        run: cargo fmt --all -- --check

      - name: 📎 Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: 🧪 Run tests
        run: cargo test --verbose

  build-linux:
    name: 🐧 Build Linux
    needs: quality-check
    if: success() && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 🎬 Install mkvtoolnix
        run: sudo apt-get update && sudo apt-get install -y mkvtoolnix

      - name: 🔨 Build release
        run: cargo build --release

      - name: 📏 Strip binary
        run: strip target/release/sub || true

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub-linux-x86_64
          path: target/release/sub

  build-macos:
    name: 🍎 Build macOS
    needs: quality-check
    if: success() && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 🎬 Install mkvtoolnix
        run: brew install mkvtoolnix

      - name: 🔨 Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub-macos-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/sub

  build-windows:
    name: 🪟 Build Windows
    needs: quality-check
    if: success() && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Build release
        run: cargo build --release

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub-windows-x86_64
          path: target/release/sub.exe

  release:
    name: 🚀 Create Release
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📦 Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            platform=$(basename "$dir")
            if [ -f "$dir/sub" ]; then
              cp "$dir/sub" "release/$platform"
              chmod +x "release/$platform"
            elif [ -f "$dir/sub.exe" ]; then
              cp "$dir/sub.exe" "release/$platform.exe"
            fi
          done
          ls -la release/

      - name: 📝 Generate release body
        id: release_body
        run: |
          TAG_NAME="${{ github.ref_name }}"
          
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -A 1 "^${TAG_NAME}$" | tail -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges "${TAG_NAME}" | head -20)
          else
            COMMITS=$(git log --oneline --no-merges "${PREV_TAG}..${TAG_NAME}" | head -20)
          fi
          
          # Build release body
          BODY="## 🎬 Subtitle Tool ${TAG_NAME}"
          BODY="${BODY}\n\nCLI tool for subtitle management - download, extract, and inject subtitles."
          BODY="${BODY}\n\n### 📦 Installation"
          BODY="${BODY}\n\`\`\`bash"
          BODY="${BODY}\n# Linux/macOS"
          BODY="${BODY}\nchmod +x sub-*"
          BODY="${BODY}\n./sub-* --help"
          BODY="${BODY}\n\n# Or move to PATH"
          BODY="${BODY}\nsudo mv sub-linux-x86_64 /usr/local/bin/sub"
          BODY="${BODY}\n\`\`\`"
          BODY="${BODY}\n\n### ✨ What's Changed"
          
          if [ -n "$COMMITS" ]; then
            BODY="${BODY}\n"
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                HASH=$(echo "$line" | cut -d' ' -f1)
                MSG=$(echo "$line" | cut -d' ' -f2-)
                BODY="${BODY}\n- ${MSG} ([${HASH}](https://github.com/${{ github.repository }}/commit/${HASH}))"
              fi
            done <<< "$COMMITS"
          else
            BODY="${BODY}\nSee changelog below ⬇️"
          fi
          
          BODY="${BODY}\n\n[View full changelog](https://github.com/${{ github.repository }}/commits/${TAG_NAME})"
          
          # Save to output (escape for multiline)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: ${{ steps.release_body.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
